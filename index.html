<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Music — Blitz Nation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F7F5;--white:#FFFFFF;
  --border:#E5DDD3;--border-h:#C4AD90;
  --tan:#A8976E;--tan-l:#D6C9B0;--tan-bg:#F5F0E8;
  --text:#1A1A1A;--text-2:#595959;--muted:#9A9082;
  --orange:#ED5829;
  --r:10px;--rl:16px;--t:.18s ease;
  --sh:0 1px 8px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shh:0 2px 14px rgba(0,0,0,.10),0 6px 24px rgba(0,0,0,.06);
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{padding:0 28px;height:62px;display:flex;align-items:center;
  justify-content:space-between;gap:16px;background:var(--white);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.prog-wrap{flex:1;max-width:320px;display:flex;align-items:center;gap:12px}
.prog-bar{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:var(--tan);transition:width .5s ease}
.step-ctr{font-size:12px;color:var(--muted);letter-spacing:.05em;white-space:nowrap}

/* MAIN */
.main{display:flex;justify-content:center;padding:48px 18px 130px}
.sw{width:100%;max-width:700px;animation:rise .28s ease both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* STEP LABELS */
.s-sec{font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--tan);margin-bottom:10px}
.s-title{font-family:'Cormorant Garant',serif;font-size:34px;font-weight:600;line-height:1.15;margin-bottom:10px}
.s-sub{font-size:15px;color:var(--text-2);margin-bottom:32px;line-height:1.65;font-weight:300}
@media(max-width:600px){.s-title{font-size:24px}.s-sub{font-size:14px}}

/* OPTION CARDS */
.opts{display:grid;gap:9px}
.opts.c2{grid-template-columns:repeat(2,1fr)}
@media(max-width:560px){.opts.c2{grid-template-columns:1fr}}
.opt{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  padding:17px 19px;cursor:pointer;display:flex;align-items:flex-start;gap:13px;
  transition:border-color var(--t),box-shadow var(--t),transform var(--t);box-shadow:var(--sh)}
.opt:hover{border-color:var(--tan);box-shadow:var(--shh);transform:translateY(-1px)}
.opt.sel{border-color:var(--tan);background:var(--tan-bg)}
.indicator{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;transition:all var(--t)}
.opt.sel .indicator{background:var(--tan);border-color:var(--tan);color:#fff}
.ind-sq{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border);
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;transition:all var(--t)}
.opt.sel .ind-sq{background:var(--tan);border-color:var(--tan);color:#fff}
.opt-body{flex:1;min-width:0}
.opt-label{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.opt-desc{font-size:13px;color:var(--muted);line-height:1.5;font-weight:300}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;
  align-self:flex-start;flex-shrink:0;letter-spacing:.05em}
.b-tier{background:var(--tan-bg);color:var(--tan);border:1px solid var(--tan-l)}
.b-pop{background:var(--text);color:#fff;font-size:9px;letter-spacing:.08em}

/* MUSIC PICKER (genre + size on one screen) */
.picker-group-label{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px}
.picker-divider{display:flex;align-items:center;gap:14px;margin:20px 0;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500}
.picker-divider::before,.picker-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.size-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
@media(max-width:500px){.size-row{grid-template-columns:repeat(2,1fr)}}
.size-opt{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  padding:14px 10px;cursor:pointer;text-align:center;
  transition:border-color var(--t),box-shadow var(--t),transform var(--t);box-shadow:var(--sh)}
.size-opt:hover{border-color:var(--tan);box-shadow:var(--shh);transform:translateY(-1px)}
.size-opt.sel{border-color:var(--tan);background:var(--tan-bg)}
.size-opt-label{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.size-opt-desc{font-size:11px;color:var(--muted);font-weight:300}

/* BAND CARDS */
.band-grid{display:grid;gap:16px}
.band-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rl);
  overflow:hidden;cursor:pointer;transition:border-color var(--t),box-shadow var(--t),transform var(--t);box-shadow:var(--sh)}
.band-card:hover{border-color:var(--tan);box-shadow:var(--shh);transform:translateY(-2px)}
.band-card.sel{border-color:var(--tan)}
.band-media{position:relative;width:100%;aspect-ratio:16/7;
  background:linear-gradient(135deg,#EDE5D8,#D6CAB8);
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.band-card.sel .band-media{outline:3px solid var(--tan);outline-offset:-3px}
.ph-label{font-family:'Cormorant Garant',serif;font-style:italic;font-size:13px;color:var(--tan);opacity:.6;letter-spacing:.08em}
.vbtn{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.92);
  border:none;border-radius:20px;padding:5px 13px 5px 9px;font-family:'Jost',sans-serif;
  font-size:11px;font-weight:500;color:var(--text);cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:background var(--t)}
.vbtn:hover{background:#fff}
.vbtn.disabled{opacity:.4;cursor:default}
.pi{width:18px;height:18px;background:var(--tan);border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.pi::after{content:'';border-style:solid;border-width:3.5px 0 3.5px 6px;
  border-color:transparent transparent transparent #fff;margin-left:2px}
.pi.grey{background:var(--muted)}
.band-body{padding:16px 19px;display:flex;align-items:flex-start;gap:12px}
.band-info{flex:1}
.band-name{font-family:'Cormorant Garant',serif;font-size:21px;font-weight:600;margin-bottom:6px}
.band-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.band-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;
  background:var(--tan-bg);color:var(--tan);border:1px solid var(--tan-l);
  letter-spacing:.05em;text-transform:uppercase}
.band-desc{font-size:13px;color:var(--muted);line-height:1.5;font-weight:300}
.band-chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;transition:all var(--t)}
.band-card.sel .band-chk{background:var(--tan);border-color:var(--tan);color:#fff}

/* ACT CARDS */
.act-section-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin:22px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.act-section-label:first-child{margin-top:0}
.act-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:540px){.act-grid{grid-template-columns:1fr}}
.act-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:border-color var(--t),box-shadow var(--t),transform var(--t);box-shadow:var(--sh)}
.act-card:hover{border-color:var(--tan);box-shadow:var(--shh);transform:translateY(-1px)}
.act-card.sel{border-color:var(--tan);background:var(--tan-bg)}
.act-media{position:relative;width:100%;aspect-ratio:4/3;
  background:linear-gradient(135deg,#EDE5D8 0%,#D6CAB8 100%);
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.act-card.sel .act-media{outline:3px solid var(--tan);outline-offset:-3px}
.act-body{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.act-info{flex:1}
.act-name{font-family:'Cormorant Garant',serif;font-size:16px;font-weight:600;margin-bottom:2px}
.price-tier{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--tan);background:rgba(171,156,122,.12);border:1px solid rgba(171,156,122,.3);border-radius:4px;padding:1px 5px;vertical-align:middle;margin-left:5px}
.elite-badge{font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.07em;color:#fff;background:var(--tan);border-radius:4px;padding:1px 6px;vertical-align:middle;margin-left:5px;text-transform:uppercase}
.confirm-card{display:flex;align-items:center;gap:14px;background:var(--cream);border:1px solid rgba(171,156,122,.3);border-radius:12px;padding:14px;margin-bottom:28px}
.confirm-card-img{width:80px;height:80px;border-radius:8px;object-fit:cover;flex-shrink:0}
.confirm-card-img-ph{width:80px;height:80px;border-radius:8px;background:#e8e3da;flex-shrink:0}
.confirm-card-label{font-family:'Jost',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tan);margin-bottom:4px}
.confirm-card-name{font-family:'Cormorant Garant',serif;font-size:22px;font-weight:600;color:#222;line-height:1.2}
.confirm-card-sub{font-family:'Jost',sans-serif;font-size:12px;color:#999;margin-top:3px}
.act-sub{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--tan);margin-bottom:4px}
.act-desc{font-size:12px;color:var(--muted);line-height:1.45;font-weight:300}
.act-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
  transition:all var(--t)}
.act-card.sel .act-chk{background:var(--tan);border-color:var(--tan);color:#fff}

/* EXTRA HERO + CARDS */
.extra-hero{width:100%;aspect-ratio:16/7;border-radius:var(--r);
  background:linear-gradient(135deg,#EDE5D8,#D6CAB8);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:26px;overflow:hidden;position:relative}
.extra-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.extra-hero-ph{font-family:'Cormorant Garant',serif;font-style:italic;font-size:14px;color:var(--tan);opacity:.65;letter-spacing:.08em}
.extra-cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:540px){.extra-cards-grid{grid-template-columns:1fr}}
.extra-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:border-color var(--t),box-shadow var(--t),transform var(--t);box-shadow:var(--sh)}
.extra-card:hover{border-color:var(--tan);box-shadow:var(--shh);transform:translateY(-1px)}
.extra-card.sel{border-color:var(--tan);background:var(--tan-bg)}
.extra-media{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#EDE5D8,#D6CAB8);
  display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.extra-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.extra-body{padding:11px 13px;display:flex;align-items:flex-start;gap:9px}
.extra-info{flex:1}
.extra-name{font-size:13px;font-weight:500;margin-bottom:2px}
.extra-desc{font-size:12px;color:var(--muted);line-height:1.4;font-weight:300}
.extra-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;transition:all var(--t)}
.extra-card.sel .extra-chk{background:var(--tan);border-color:var(--tan);color:#fff}

/* SPLIT FIELDS */
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:500px){.split-grid{grid-template-columns:1fr}}
.split-field{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  padding:19px 21px;transition:border-color var(--t);box-shadow:var(--sh)}
.split-field:focus-within{border-color:var(--tan)}
.split-label{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin-bottom:9px;display:block}
.split-input{width:100%;background:none;border:none;outline:none;font-family:'Jost',sans-serif;
  font-size:22px;font-weight:300;color:var(--text);padding:0}
.split-input::placeholder{color:var(--tan-l)}

/* INPUTS */
.igroup{margin-bottom:17px}
.ilabel{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
.ifield{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  padding:12px 15px;font-size:15px;color:var(--text);font-family:'Jost',sans-serif;
  transition:border-color var(--t);outline:none;box-shadow:var(--sh)}
.ifield:focus{border-color:var(--tan)}
.ifield::placeholder{color:var(--tan-l)}
textarea.ifield{resize:vertical;min-height:88px;font-weight:300}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:540px){.form-row{grid-template-columns:1fr}}

/* INFO BOX */
.info-box{background:var(--tan-bg);border:1px solid var(--tan-l);border-radius:var(--r);padding:18px 22px;margin-bottom:22px}
.info-box strong{display:block;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--tan);margin-bottom:6px}
.info-box p{font-size:13px;color:var(--text-2);line-height:1.6;font-weight:300}

/* SUMMARY */
.sum-section{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:22px;margin-bottom:12px;box-shadow:var(--sh)}
.sum-section-title{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--tan);margin-bottom:14px}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.sum-row:last-child{border-bottom:none}
.sum-k{color:var(--muted);flex-shrink:0;font-weight:300;min-width:130px}
.sum-v{color:var(--text);font-weight:500;text-align:right;word-break:break-word}

/* FOOTER */
.fnav{position:fixed;bottom:0;left:0;right:0;padding:13px 22px;
  background:rgba(249,247,245,.97);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);display:flex;gap:11px;align-items:center;z-index:100}
.btn{padding:13px 26px;border-radius:var(--r);font-family:'Jost',sans-serif;font-weight:500;
  font-size:13px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;
  transition:all var(--t);border:none;outline:none}
.btn-back{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-back:hover{border-color:var(--text);color:var(--text)}
.btn-next{background:var(--text);color:#fff;flex:1;max-width:250px;box-shadow:0 2px 10px rgba(26,26,26,.14)}
.btn-next:hover:not(:disabled){background:#333;transform:translateY(-1px)}
.btn-next:disabled{opacity:.28;cursor:not-allowed}
.btn-submit{background:var(--orange);color:#fff;flex:1;max-width:250px;box-shadow:0 2px 10px rgba(237,88,41,.22)}
.btn-submit:hover{background:#d44b20;transform:translateY(-1px)}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* VIDEO MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--white);border-radius:var(--rl);overflow:hidden;
  width:100%;max-width:780px;position:relative}
.modal-hdr{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)}
.modal-title{font-family:'Cormorant Garant',serif;font-size:20px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;
  color:var(--muted);line-height:1;padding:4px 8px;border-radius:6px;transition:color var(--t)}
.modal-close:hover{color:var(--text)}
.modal-frame{position:relative;width:100%;aspect-ratio:16/9}
.modal-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.watch-vid-btn{display:block;width:100%;text-align:center;padding:10px;
  font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:.08em;
  text-transform:uppercase;color:var(--tan);background:none;border:none;
  border-top:1px solid var(--border);cursor:pointer;transition:background var(--t)}
.watch-vid-btn:hover:not(:disabled){background:var(--tan-bg)}
.watch-vid-btn:disabled{color:var(--tan-l);cursor:default}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <a href="https://weareblitznation.com" target="_blank">
      <img src="https://static.wixstatic.com/media/aefb83_8063438947e146b0ba23c45286efaba7~mv2.png/v1/fill/w_218,h_30,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/Blitz%20Nation%20Logo%20Padding.png"
           alt="Blitz Nation" style="height:26px;width:auto;display:block">
    </a>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="pf" style="width:3%"></div></div>
      <div class="step-ctr" id="sc">Step 1</div>
    </div>
  </header>
  <main class="main"><div id="sw" class="sw"></div></main>
  <nav class="fnav" id="fnav">
    <button class="btn btn-back" id="btnBack" onclick="goBack()">← Back</button>
    <button class="btn btn-next" id="btnNext" onclick="goNext()">Continue →</button>
  </nav>
</div>
<div id="videoModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeVideo()">
  <div class="modal-box">
    <div class="modal-hdr">
      <div id="videoTitle" class="modal-title"></div>
      <button class="modal-close" onclick="closeVideo()">✕</button>
    </div>
    <div class="modal-frame">
      <iframe id="videoFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
</div>
<script>
// ── CONFIG ───────────────────────────────────────────────────
const EJ_KEY = 'YOUR_PUBLIC_KEY';
const EJ_SVC = 'YOUR_SERVICE_ID';
const EJ_TPL = 'YOUR_TEMPLATE_ID';
emailjs.init({ publicKey: EJ_KEY });

// ── BAND DATA ────────────────────────────────────────────────
const P = (h,w,r) => `https://static.wixstatic.com/media/${h}/v1/fill/w_${w},h_${r},al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/photo.jpg`;
const BAND_DATA = {
  blitz_house:       { name:'Blitz House Band',   range:'4–5 Piece',  genre:'Party',        desc:'Our flagship house band — versatile, high-energy, always a crowd favourite.',                photo:P('aefb83_fc7fc43e01234f50a58fec55ca5fe13d~mv2.png',980,428), video:'https://www.youtube.com/watch?v=EU0Dhp9B3xI' },
  rock_nation:       { name:'Rock Nation',         range:'4–5 Piece',  genre:'Rock',         desc:'Classic rock anthems to contemporary indie hits, for couples who love guitar-driven energy.',photo:P('feee51_c128605fed7a4d66a4722341720b0475~mv2.png',980,428), video:'https://www.youtube.com/watch?v=LuJKZ2WVovs' },
  blitz_fusion:      { name:'Blitz Fusion',        range:'4–5 Piece',  genre:'DJ + Live',    desc:'DJ energy fused with live instrumentation — a truly unique experience.',                    photo:P('aefb83_87dd898d5225436f80aba30cbcc54226~mv2.png',980,428), video:'https://www.youtube.com/watch?v=Jwvl1R4yNiE' },

const times      = () => ans.ceremony_times || [];
const hasCeremony= () => times().includes('ceremony');
const hasCocktail= () => times().includes('cocktail');
const hasDinner  = () => times().includes('dinner');

function firstTimeStep() {
  if (hasCeremony()) return 'ceremony_music_type';
  if (hasCocktail()) return 'cocktail_music_type';
  if (hasDinner())   return 'dinner_music_type';
  return 'ceremony_details';
}
function afterCeremonyConfig() {
  if (ans.journey === 'dj') {
    if (hasCocktail()) return 'cocktail_music_type';
    if (hasDinner())   return 'dinner_music_type';
    return 'dj_podiums';
  }
  return 'ceremony_details';
}
function afterCeremonyDetails() {
  if (hasCocktail()) return 'cocktail_music_type';
  if (hasDinner())   return 'dinner_music_type';
  return 'speeches_sound';
}
function afterCocktailConfig() {
  if (ans.journey === 'dj') {
    if (hasDinner()) return 'dinner_music_type';
    return 'dj_podiums';
  }
  if (hasDinner()) return 'dinner_music_type';
  return 'speeches_sound';
}
function afterDinnerConfig() {
  if (ans.journey === 'dj') return 'dj_podiums';
  return 'speeches_sound';
}

// Routes from music_picker selection (genre or size) to the sub-step
function musicPickNext(val, prefix, afterFn) {
  const map = {
    strings:'_strings', jazz:'_jazz', acoustic:'_acoustic', soloist:'_soloist', roaming:'_roaming',
    solo:'_size_solo', duo:'_size_duo', trio:'_size_trio', quartet:'_size_quartet',
  };
  return map[val] ? prefix + map[val] : afterFn();
}

function bandSizeLabel() {
  return ({ '4_5':'4–5 Piece','6_8':'6–8 Piece','9_11':'9–11 Piece','12_15':'12–15 Piece','orchestra':'Band + Orchestra' })[ans.band_size] || 'your band';
}
function bandOptions() {
  return ({
    '4_5':      ['blitz_house','rock_nation','blitz_fusion'],
    '6_8':      ['viva','fortune_west','the_rumours','late_night','blitz_house','rock_nation','blitz_fusion_large'],
    '9_11':     ['viva','fortune_west','the_rumours','late_night','blitz_fusion_large'],
    '12_15':    ['viva','fortune_west','late_night'],
    'orchestra':['custom_orchestra'],
  })[ans.band_size] || [];
}
function afterBandExtras() { return 'contact_details'; }

// Build a sub-step for a given moment prefix
function subStep(section, title, key, actKeys, groups, nextFn, subtitle) {
  return { section, title, subtitle: subtitle || 'Select the style that best matches your vision — we\'ll go through all the details together in your consultation.', type:'act_cards', key, actKeys, groups, next: nextFn };
}

// ── STEP RESOLVER ────────────────────────────────────────────
function getStep(id) {
  const s = steps[id];
  if (!s) return null;
  return { ...s, id,
    section: typeof s.section  === 'function' ? s.section()  : s.section,
    title:   typeof s.title    === 'function' ? s.title()    : s.title,
    subtitle:typeof s.subtitle === 'function' ? s.subtitle() : s.subtitle,
    options: typeof s.options  === 'function' ? s.options()  : s.options,
  };
}

// ── NAVIGATION ───────────────────────────────────────────────
function goNext() {
  const step = getStep(cur);
  if (!step) return;
  if (step.type === 'contact') { if (!captureContact()) { doShake(); return; } push(step.next()); return; }
  if (step.type === 'summary') { sendEnquiry(); return; }
  if (!hasValue(step)) { doShake(); return; }
  const nxt = step.next();
  if (nxt) push(nxt);
}
function goBack() {
  if (hist.length <= 1) return;
  hist.pop(); cur = hist[hist.length - 1]; render();
}
function push(id) { hist.push(id); cur = id; render(); }

function hasValue(s) {
  if (s.type === 'single' || s.type === 'band_cards' || s.type === 'act_cards' || s.type === 'music_picker' || s.type === 'lighting_cards') return !!ans[s.key];
  if (s.type === 'multi')             return (ans[s.key]||[]).length > 0;
  if (s.type === 'time')              return !!ans[s.key];
  if (s.type === 'number')            return !!ans[s.key];
  if (s.type === 'reception_details') return !!(ans.reception_time && ans.band_guest_count);
  if (s.type === 'ceremony_details')  return !!ans.event_arrival_time;
  if (s.type === 'extra_cards')       return (ans[s.key]||[]).length > 0;
  if (s.type === 'strings_confirm')   return !!ans[s.key];
  return true;
}

function doShake() {
  const b = document.getElementById('btnNext');
  b.style.animation='none'; b.offsetHeight; b.style.animation='shake .35s ease';
}
function selectOpt(key, value, multi) {
  if (multi) {
    if (!ans[key]) ans[key] = [];
    const i = ans[key].indexOf(value);
    if (i===-1) ans[key].push(value); else ans[key].splice(i,1);
  } else { ans[key] = value; }
  renderStep(getStep(cur)); updateNav();
}
function selectExtra(key, value) {
  if (!ans[key]) ans[key] = [];
  if (value === 'none') { ans[key] = ['none']; }
  else {
    ans[key] = ans[key].filter(v => v !== 'none');
    const i = ans[key].indexOf(value);
    if (i===-1) ans[key].push(value); else ans[key].splice(i,1);
  }
  renderStep(getStep(cur)); updateNav();
}

// ── RENDER ───────────────────────────────────────────────────
function render() {
  const step = getStep(cur);
  if (!step) return;
  renderStep(step); updateProgress(); updateNav(); window.scrollTo(0,0);
}
function renderStep(step) {
  const w = document.getElementById('sw');
  let h = '';
  if (step.section) h += `<div class="s-sec">${step.section}</div>`;
  h += `<h1 class="s-title">${step.title}</h1>`;
  if (step.subtitle) h += `<p class="s-sub">${step.subtitle}</p>`;
  if (step.heroKey) {
    const d = EXTRA_DATA[step.heroKey];
    h += `<div class="extra-hero">${d&&d.photo?`<img src="${d.photo}" alt="${d.name}">`:'<span class="extra-hero-ph">Photo placeholder</span>'}</div>`;
  }
  switch(step.type) {
    case 'single':           h += renderOpts(step, false); break;
    case 'multi':            h += renderOpts(step, true);  break;
    case 'music_picker':     h += renderMusicPicker(step); break;
    case 'band_cards':       h += renderBandCards(step);   break;
    case 'act_cards':        h += renderActCards(step);      break;
    case 'extra_cards':      h += renderExtraCards(step);    break;
    case 'lighting_cards':   h += renderLightingCards(step); break;
    case 'strings_confirm':  h += renderStringsConfirm(step); break;
    case 'time':             h += renderTime(step);        break;
    case 'number':           h += renderNumber(step);      break;
    case 'reception_details':h += renderSplitFields('rec_time','Reception start time','time',ans.reception_time,'reception_time','rec_guests','Number of guests','number',ans.band_guest_count,'band_guest_count'); break;
    case 'ceremony_details': h += renderSplitFields('cer_time','Guest arrival time','time',ans.event_arrival_time,'event_arrival_time','cer_guests','Number of guests','number',ans.ceremony_guest_count,'ceremony_guest_count'); break;
    case 'contact':          h += renderContact(); break;
    case 'summary':          h += renderSummary(); break;
  }
  w.innerHTML = h;
  w.style.animation='none'; w.offsetHeight; w.style.animation='rise .28s ease both';
}

function renderOpts(step, multi) {
  let h = `<div class="opts${step.cols===2?' c2':''}">`;
  for (const o of (step.options||[])) {
    const sel = multi ? (ans[step.key]||[]).includes(o.value) : ans[step.key]===o.value;
    h += `<div class="opt${sel?' sel':''}" onclick="selectOpt('${step.key}','${o.value}',${multi})">`;
    h += multi ? `<div class="ind-sq">${sel?'✓':''}</div>` : `<div class="indicator">${sel?'✓':''}</div>`;
    h += `<div class="opt-body"><div class="opt-label">${o.label}</div>`;
    if (o.desc) h += `<div class="opt-desc">${o.desc}</div>`;
    h += `</div>`;
    if (o.popular) h += `<div class="badge b-pop">Most Popular</div>`;
    else if (o.badge) h += `<div class="badge b-tier">${o.badge}</div>`;
    h += `</div>`;
  }
  return h + '</div>';
}

function renderMusicPicker(step) {
  const key = step.key;
  const cur = ans[key];
  const genres = [
    { value:'strings',  label:'Strings',       desc:'Classical & contemporary' },
    { value:'jazz',     label:'Jazz',           desc:'Smooth & sophisticated' },
    { value:'acoustic', label:'Acoustic',       desc:'Warm & intimate' },
    { value:'soloist',  label:'Blitz Elite',    desc:'Book a named individual artist' },
    { value:'roaming',  label:'Roaming',        desc:'Musicians who mingle' },
  ];
  const sizes = [
    { value:'solo',    label:'Solo',    desc:'1 musician' },
    { value:'duo',     label:'Duo',     desc:'2 musicians' },
    { value:'trio',    label:'Trio',    desc:'3 musicians' },
    { value:'quartet', label:'Quartet', desc:'4 musicians' },
  ];
  let h = `<div class="picker-group-label">Browse by genre</div><div class="opts c2">`;
  for (const g of genres) {
    const sel = cur === g.value;
    h += `<div class="opt${sel?' sel':''}" onclick="selectOpt('${key}','${g.value}',false)">
      <div class="indicator">${sel?'✓':''}</div>
      <div class="opt-body"><div class="opt-label">${g.label}</div><div class="opt-desc">${g.desc}</div></div>
    </div>`;
  }
  h += `</div><div class="picker-divider">or browse by size</div><div class="size-row">`;
  for (const s of sizes) {
    const sel = cur === s.value;
    h += `<div class="size-opt${sel?' sel':''}" onclick="selectOpt('${key}','${s.value}',false)">
      <div class="size-opt-label">${s.label}</div>
      <div class="size-opt-desc">${s.desc}</div>
    </div>`;
  }
  return h + '</div>';
}

function renderBandCards(step) {
  let h = '<div class="band-grid">';
  for (const key of (step.options||[])) {
    const d = BAND_DATA[key] || { name:key, range:'—', genre:'—', desc:'Details coming soon.', photo:null, video:null };
    const sel = ans[step.key] === key;
    h += `<div class="band-card${sel?' sel':''}" onclick="selectOpt('${step.key}','${key}',false)">
      <div class="band-media">
        ${d.photo?`<img src="${d.photo}" alt="${d.name}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`:'<span class="ph-label">Photo placeholder</span>'}
        <button class="vbtn${d.video?'':' disabled'}" onclick="event.stopPropagation();${d.video?`openBandVideo('${key}')`:'void(0)'}">
          <span class="pi${d.video?'':' grey'}"></span>${d.video?'Watch Showreel':'Video coming soon'}
        </button>
      </div>
      <div class="band-body">
        <div class="band-info">
          <div class="band-name">${d.name}</div>
          <div class="band-tags"><span class="band-tag">${d.range}</span><span class="band-tag">${d.genre}</span></div>
          <div class="band-desc">${d.desc}</div>
        </div>
        <div class="band-chk">${sel?'✓':''}</div>
      </div>
    </div>`;
  }
  return h + '</div>';
}

function renderLightingCards(step) {
  let h = '<div class="band-grid">';
  for (const key of (step.pkgKeys||[])) {
    const d = LIGHTING_DATA[key] || { name:key, desc:'', photo:null };
    const sel = ans[step.key] === key;
    h += `<div class="band-card${sel?' sel':''}" onclick="selectOpt('${step.key}','${key}',false)">
      <div class="band-media">
        ${d.photo?`<img src="${d.photo}" alt="${d.name}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`:'<span class="ph-label">Photo placeholder</span>'}
      </div>
      <div class="band-body">
        <div class="band-info">
          <div class="band-name">${d.name}</div>
          <div class="band-desc">${d.desc}</div>
        </div>
        <div class="band-chk">${sel?'✓':''}</div>
      </div>
    </div>`;

  return h + '</div>';
}

function renderActCards(step) {
  const key = step.key;
  if (step.groups) {
    let h = '';
    for (const g of step.groups) {
      h += `<div class="act-section-label">${g.label}</div><div class="act-grid">`;
      for (const ak of g.keys) h += actCardHtml(ak, key);
      h += '</div>';
    }
    return h;
  }
  return `<div class="act-grid">${(step.actKeys||[]).map(ak => actCardHtml(ak, key)).join('')}</div>`;
}

function actCardHtml(actKey, stateKey) {
  const d = ACT_DATA[actKey] || { name:actKey, sub:'', desc:'Details coming soon.', photo:null, video:null };
  const sel = ans[stateKey] === actKey;
  const vidBtn = d.video
    ? `<button class="watch-vid-btn" onclick="event.stopPropagation();openActVideo('${actKey}')">Watch Video</button>`
    : `<button class="watch-vid-btn" disabled>Video coming soon</button>`;
  return `<div class="act-card${sel?' sel':''}" onclick="selectOpt('${stateKey}','${actKey}',false)">
    <div class="act-media">
      ${d.photo?`<img src="${d.photo}" alt="${d.name}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`:'<span class="ph-label" style="font-size:11px">Photo placeholder</span>'}
    </div>
    <div class="act-body">
      <div class="act-info">
        ${d.sub?`<div class="act-sub">${d.sub}</div>`:''}
        <div class="act-name">${d.name}${d.elite?' <span class="elite-badge">Blitz Elite</span>':''}${d.price?` <span class="price-tier">${d.price}</span>`:''}</div>
        <div class="act-desc">${d.desc}</div>
      </div>
      <div class="act-chk">${sel?'✓':''}</div>
    </div>
    ${vidBtn}
  </div>`;
}

function openVideoModal(name, ytUrl) {
  const id = ytUrl.match(/(?:v=|youtu\.be\/)([^&?/]+)/)?.[1];
  if (!id) return;
  document.getElementById('videoTitle').textContent = name;
  document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  document.getElementById('videoModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function openActVideo(key) {
  const d = ACT_DATA[key];
  if (!d || !d.video) return;
  openVideoModal(d.name, d.video);
}
function openBandVideo(key) {
  const d = BAND_DATA[key];
  if (!d || !d.video) return;
  openVideoModal(d.name, d.video);
}
function closeVideo() {
  document.getElementById('videoModal').style.display = 'none';
  document.getElementById('videoFrame').src = '';
  document.body.style.overflow = '';
}

function renderStringsConfirm(step) {
  const actKey = ans[step.sourceKey];
  const act = ACT_DATA[actKey] || {};
  const sizeMap = {
    string_nation:  [{value:'duo',label:'Duo',desc:'2 musicians'},{value:'trio',label:'Trio',desc:'3 musicians'},{value:'quartet',label:'Quartet',desc:'4 musicians'}],
    second_strings: [{value:'duo',label:'Duo',desc:'2 musicians'},{value:'trio',label:'Trio',desc:'3 musicians'},{value:'quartet',label:'Quartet',desc:'4 musicians'}],
    blitz_quartet:  [{value:'trio',label:'Trio',desc:'3 musicians'},{value:'quartet',label:'Quartet',desc:'4 musicians'}],
  };
  const sizes = sizeMap[actKey] || [];
  const sel = ans[step.key];
  let h = `<div class="confirm-card">`;
  if (act.photo) {
    h += `<img class="confirm-card-img" src="${act.photo}" alt="${act.name}">`;
  } else {
    h += `<div class="confirm-card-img-ph"></div>`;
  }
  h += `<div class="confirm-card-info">
    <div class="confirm-card-label">Your selection</div>
    <div class="confirm-card-name">${act.name||actKey}</div>
    ${act.sub ? `<div class="confirm-card-sub">${act.sub}</div>` : ''}
  </div></div>`;
  h += `<div class="opts">`;
  for (const o of sizes) {
    const chosen = sel === o.value;
    h += `<div class="opt${chosen?' sel':''}" onclick="selectOpt('${step.key}','${o.value}',false)">
      <div class="indicator">${chosen?'✓':''}</div>
      <div class="opt-body"><div class="opt-label">${o.label}</div>`;
    if (o.desc) h += `<div class="opt-desc">${o.desc}</div>`;
    h += `</div></div>`;
  }
  h += `</div>`;
  return h;
}

function renderExtraCards(step) {
  const key = step.key;
  const selected = ans[key] || [];
  let h = `<div class="extra-cards-grid">`;
  for (const ek of (step.extraKeys||[])) {
    const d = EXTRA_DATA[ek] || { name:ek, desc:'', photo:null };
    const sel = selected.includes(ek);
    h += `<div class="extra-card${sel?' sel':''}" onclick="selectExtra('${key}','${ek}')">
      <div class="extra-media">${d.photo?`<img src="${d.photo}" alt="${d.name}">`:'<span class="ph-label" style="font-size:11px">Photo placeholder</span>'}</div>
      <div class="extra-body">
        <div class="extra-info"><div class="extra-name">${d.name}</div><div class="extra-desc">${d.desc}</div></div>
        <div class="extra-chk">${sel?'✓':''}</div>
      </div>
    </div>`;
  }
  const nonesel = selected.includes('none');
  h += `<div class="extra-card${nonesel?' sel':''}" onclick="selectExtra('${key}','none')" style="grid-column:1/-1">
    <div class="extra-body" style="padding:16px 18px;gap:12px">
      <div class="ind-sq${nonesel?' sel':''}" style="margin-top:0;flex-shrink:0">${nonesel?'✓':''}</div>
      <div class="extra-info"><div class="extra-name">None of these — continue without extras</div></div>
    </div>
  </div>`;
  return h + '</div>';
}

function renderSplitFields(id1,label1,type1,val1,key1,id2,label2,type2,val2,key2) {
  const f = (id,label,type,val,key) =>
    `<div class="split-field"><label class="split-label" for="${id}">${label}</label>
    <input type="${type}" id="${id}" class="split-input" value="${val||''}"
      placeholder="${type==='number'?'e.g. 200':''}"
      ${type==='time'?'onchange':'oninput'}="ans['${key}']=this.value;updateNav()"></div>`;
  return `<div class="split-grid">${f(id1,label1,type1,val1,key1)}${f(id2,label2,type2,val2,key2)}</div>`;
}
function renderTime(step) {
  return `<input type="time" class="ifield" style="max-width:220px" value="${ans[step.key]||''}" onchange="ans['${step.key}']=this.value;updateNav()">`;
}
function renderNumber(step) {
  return `<input type="number" class="ifield" style="max-width:220px" value="${ans[step.key]||''}" placeholder="${step.placeholder||''}" min="1" max="5000" oninput="ans['${step.key}']=this.value;updateNav()">`;
}
function renderContact() {
  const f = (id,label,type,ph,req) =>
    `<div class="igroup"><label class="ilabel">${label}${req?' *':''}</label>
    <input type="${type}" id="${id}" class="ifield" placeholder="${ph}" value="${ans[id]||''}" oninput="ans['${id}']=this.value"></div>`;
  return `
    <div class="form-row">${f('c_name','Full Name','text','Your full name',true)}${f('c_email','Email Address','email','your@email.com',true)}</div>
    <div class="form-row">${f('c_phone','Phone Number','tel','+353 ...',true)}${f('c_date','Wedding Date','date','',true)}</div>
    ${f('c_venue','Venue Name & Location','text','e.g. The Shelbourne Hotel, Dublin')}
    <div class="igroup"><label class="ilabel">Anything else you'd like us to know?</label>
    <textarea id="c_notes" class="ifield" placeholder="Special requests, budget guidance, questions..." oninput="ans.c_notes=this.value">${ans.c_notes||''}</textarea></div>`;
}
function captureContact() {
  ['c_name','c_email','c_phone','c_date','c_venue','c_notes'].forEach(id => {
    const el = document.getElementById(id); if(el) ans[id]=el.value.trim();
  });
  return ans.c_name && ans.c_email && ans.c_email.includes('@') && ans.c_date && ans.c_phone;
}

function renderSummary() {
  const sections = [];
  const actName = k => ACT_DATA[k]?.name || k;
  const clean = v => Array.isArray(v) ? v.filter(x=>x!=='none').join(', ') : v;
  const pickLabel = k => ({ strings:'Strings',jazz:'Jazz',acoustic:'Acoustic',roaming:'Roaming',
    solo:'Solo',duo:'Duo',trio:'Trio',quartet:'Quartet' })[k] || k;

  if (ans.ceremony_times?.length) {
    const r = [];
    if (hasCeremony() && ans.ceremony_music_type) {
      r.push(['Ceremony — style',   pickLabel(ans.ceremony_music_type)]);
      if (ans.ceremony_act) r.push(['Ceremony — act', actName(ans.ceremony_act)]);
    }
    if (hasCocktail() && ans.cocktail_music_type) {
      r.push(['Cocktail — style',   pickLabel(ans.cocktail_music_type)]);
      if (ans.cocktail_act) r.push(['Cocktail — act', actName(ans.cocktail_act)]);
    }
    if (hasDinner() && ans.dinner_music_type) {
      r.push(['Dinner — style',     pickLabel(ans.dinner_music_type)]);
      if (ans.dinner_act) r.push(['Dinner — act', actName(ans.dinner_act)]);
    }
    if (ans.event_arrival_time)    r.push(['Guest arrival',    ans.event_arrival_time]);
    if (ans.ceremony_guest_count)  r.push(['Ceremony guests',  ans.ceremony_guest_count]);
    if (ans.ceremony_vows_sound)   r.push(['Sound for vows',   ans.ceremony_vows_sound]);
    if (r.length) sections.push({ title:'Daytime Music', rows:r });
  }
  if (ans.band_size) {
    const r = [];
    r.push(['Band size', ({
      '4_5':'4–5 Piece','6_8':'6–8 Piece','9_11':'9–11 Piece','12_15':'12–15 Piece','orchestra':'Band + Orchestra'
    })[ans.band_size]||ans.band_size]);
    if (ans.band_selection)   r.push(['Band',             BAND_DATA[ans.band_selection]?.name || ans.band_selection]);
    if (ans.reception_time)   r.push(['Reception start',  ans.reception_time]);
    if (ans.band_guest_count) r.push(['Reception guests', ans.band_guest_count]);
    if (ans.dj_mc_addon)      r.push(['DJ / MC add-on',   ans.dj_mc_addon]);
    sections.push({ title:'Reception Band', rows:r });
  }
  if (ans.both_savings_take === 'yes' && ans.both_savings_moments?.length) {
    sections.push({ title:'Smart Savings', rows:[['Band musicians for', clean(ans.both_savings_moments)]] });
  }
  if (ans.dj_type) {
    const r = [];
    r.push(['Package', ({dj_only:'DJ / MC Only',fusion:'Blitz Fusion',fusion_large:'Blitz Fusion Large',late_night:'Late Night'})[ans.dj_type]||ans.dj_type]);
    if (ans.fusion_config)             r.push(['Blitz Fusion',         ans.fusion_config]);
    if (ans.fusion_custom_instruments) r.push(['Custom instruments',   clean(ans.fusion_custom_instruments)]);
    if (ans.fusion_large_config)       r.push(['Fusion Large',         ans.fusion_large_config]);
    if (ans.late_night_config)         r.push(['Late Night',           ans.late_night_config]);
    if (ans.dj_ceremony_addon)         r.push(['Ceremony add-on',      ans.dj_ceremony_addon]);
    if (ans.dj_ceremony_lineup)        r.push(['Ceremony line-up',     ans.dj_ceremony_lineup]);
    sections.push({ title:'DJ / Live', rows:r });
  }
  {
    const r = [];
    if (ans.speeches_sound) r.push(['Speeches sound', ans.speeches_sound]);
    if (ans.dj_mc_addon)    r.push(['DJ / MC',        ans.dj_mc_addon]);
    if (r.length) sections.push({ title:'Reception Details', rows:r });
  }
  {
    const r = [];
    if (ans.extra_lighting)    r.push(['Concert lighting', ans.extra_lighting]);
    if (ans.lighting_package)  r.push(['Lighting package', ans.lighting_package]);
    if (ans.extra_stage)       r.push(['Stage',            ans.extra_stage]);
    if (ans.extra_dance_floor) r.push(['Dance floor',      ans.extra_dance_floor]);
    if (ans.extra_podiums || ans.dj_podiums) r.push(['Podiums', ans.extra_podiums||ans.dj_podiums]);
    const ei = (ans.extra_items||[]).filter(v=>v!=='none');
    if (ei.length) r.push(['Other extras', ei.map(k=>EXTRA_DATA[k]?.name||k).join(', ')]);
    if (r.length) sections.push({ title:'Extras & Add-ons', rows:r });
  }
  {
    const r = [];
    if (ans.c_name)  r.push(['Name',         ans.c_name]);
    if (ans.c_email) r.push(['Email',         ans.c_email]);
    if (ans.c_phone) r.push(['Phone',         ans.c_phone]);
    if (ans.c_date)  r.push(['Wedding date',  ans.c_date]);
    if (ans.c_venue) r.push(['Venue',         ans.c_venue]);
    if (ans.c_notes) r.push(['Notes',         ans.c_notes]);
    if (r.length) sections.push({ title:'Your Details', rows:r });
  }
  let h = '';
  sections.forEach(s => {
    h += `<div class="sum-section"><div class="sum-section-title">${s.title}</div>`;
    s.rows.forEach(([k,v]) => { h += `<div class="sum-row"><span class="sum-k">${k}</span><span class="sum-v">${v}</span></div>`; });
    h += '</div>';
  });
  h += `<div class="info-box"><strong>What happens next?</strong>
    <p>The Blitz Nation team will review your selections and be in touch within 24 hours with a personalised quote and availability check.</p></div>`;
  return h;
}

// ── EMAILJS ──────────────────────────────────────────────────
function buildEmail() {
  const lines = [];
  const p = (k,v) => { if(v) lines.push(`${k}: ${Array.isArray(v)?v.filter(x=>x!=='none').join(', '):v}`); };
  p('Journey',ans.journey); p('Moments',ans.ceremony_times);
  p('Ceremony Style',ans.ceremony_music_type); p('Ceremony Act',ans.ceremony_act);
  p('Cocktail Style',ans.cocktail_music_type); p('Cocktail Act',ans.cocktail_act);
  p('Dinner Style',ans.dinner_music_type); p('Dinner Act',ans.dinner_act);
  p('Arrival Time',ans.event_arrival_time); p('Ceremony Guests',ans.ceremony_guest_count);
  p('Vows Sound',ans.ceremony_vows_sound); p('Speeches Sound',ans.speeches_sound); p('DJ/MC',ans.dj_mc_addon);
  p('Band Size',ans.band_size); p('Band',ans.band_selection);
  p('Reception Start',ans.reception_time); p('Reception Guests',ans.band_guest_count);
  p('Savings',ans.both_savings_take); p('Savings Moments',ans.both_savings_moments);
  p('Lighting',ans.extra_lighting); p('Lighting Package',ans.lighting_package);
  p('Stage',ans.extra_stage); p('Dance Floor',ans.extra_dance_floor);
  p('Podiums',ans.extra_podiums||ans.dj_podiums); p('Extras',ans.extra_items);
  p('DJ Package',ans.dj_type); p('Fusion Config',ans.fusion_config);
  p('Custom Instruments',ans.fusion_custom_instruments);
  p('Late Night',ans.late_night_config); p('Ceremony Add-on',ans.dj_ceremony_addon);
  p('Name',ans.c_name); p('Email',ans.c_email); p('Phone',ans.c_phone);
  p('Wedding Date',ans.c_date); p('Venue',ans.c_venue); p('Notes',ans.c_notes);
  return lines.join('\n');
}
async function sendEnquiry() {
  const btn = document.getElementById('btnNext');
  btn.disabled=true; btn.textContent='Sending…';
  if (EJ_KEY === 'YOUR_PUBLIC_KEY') { console.log('Dev mode:\n'+buildEmail()); showSuccess(); return; }
  try {
    await emailjs.send(EJ_SVC, EJ_TPL, {
      from_name:ans.c_name||'', from_email:ans.c_email||'', reply_to:ans.c_email||'',
      wedding_date:ans.c_date||'', venue:ans.c_venue||'', phone:ans.c_phone||'',
      summary:buildEmail(),
    });
    showSuccess();
  } catch(e) {
    console.error(e); btn.disabled=false; btn.textContent='Send Enquiry →';
    alert('Something went wrong. Please try again or contact us directly.');
  }
}
function showSuccess() {
  document.getElementById('sw').innerHTML = `
    <div style="text-align:center;padding:60px 20px 40px">
      <div style="width:60px;height:60px;background:var(--tan-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#A8976E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
      </div>
      <div class="s-sec" style="text-align:center">Enquiry Sent</div>
      <h1 class="s-title" style="margin-bottom:14px">Thank you, ${ans.c_name||'there'}.</h1>
      <p class="s-sub" style="max-width:400px;margin:0 auto 30px">The Blitz Nation team will review your selections and be in touch within 24 hours with a personalised quote and availability check.</p>
      <div style="background:var(--tan-bg);border:1px solid var(--tan-l);border-radius:var(--r);padding:15px 20px;max-width:340px;margin:0 auto 28px;font-size:13px;color:var(--muted)">
        Confirmation sent to<br><strong style="color:var(--text);font-size:15px">${ans.c_email||''}</strong>
      </div>
      <button class="btn btn-next" style="display:inline-block;max-width:160px" onclick="location.reload()">Start Over</button>
    </div>`;
  document.getElementById('fnav').style.display='none';
  document.getElementById('pf').style.width='100%';
}

// ── PROGRESS & NAV ───────────────────────────────────────────
const EST = 24;
function updateProgress() {
  const pct = Math.min(95, Math.round((hist.length/EST)*100));
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('sc').textContent = `Step ${hist.length}`;
}
function updateNav() {
  const step = getStep(cur);
  document.getElementById('btnBack').style.visibility = hist.length>1?'visible':'hidden';
  const btn = document.getElementById('btnNext');
  if (step.type === 'summary') { btn.textContent='Send Enquiry →'; btn.className='btn btn-submit'; btn.disabled=false; return; }
  btn.textContent='Continue →'; btn.className='btn btn-next';
  const free = step.type==='contact' || step.type==='multi';
  btn.disabled = !free && !hasValue(step);
}

// ── BOOT ─────────────────────────────────────────────────────
render();
</script>
</body>
</html>
